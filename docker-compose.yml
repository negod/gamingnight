# Note: The application requires SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME,
# and SPRING_DATASOURCE_PASSWORD environment variables to be set when running.
# These must be explicitly supplied - there are no default values.

services:
  postgres:
    image: postgres:16-alpine
    container_name: gaming-night-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: gaming-night
      POSTGRES_USER: gaming-night
      POSTGRES_PASSWORD: gaming-night
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gaming-night -d gaming-night"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
