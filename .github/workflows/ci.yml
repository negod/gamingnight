name: Gaming Night CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: gaming-night
          POSTGRES_USER: gaming-night
          POSTGRES_PASSWORD: gaming-night
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Run backend tests
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/gaming-night
          SPRING_DATASOURCE_USERNAME: gaming-night
          SPRING_DATASOURCE_PASSWORD: gaming-night
        run: |
          cd backend
          mvn test -Dtest="*Test,*Spec" -DfailIfNoTests=false

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Run frontend tests
        run: |
          cd frontend
          npm test

  e2e-test:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: gaming-night
          POSTGRES_USER: gaming-night
          POSTGRES_PASSWORD: gaming-night
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Install Cypress
        run: |
          cd frontend
          npm install --save-dev cypress

      - name: Start backend server
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/gaming-night
          SPRING_DATASOURCE_USERNAME: gaming-night
          SPRING_DATASOURCE_PASSWORD: gaming-night
          PORT: 8080
        run: |
          cd backend
          mvn spring-boot:run &
          sleep 60  # Wait for Spring Boot to start

      - name: Start frontend server
        run: |
          cd frontend
          npm run preview &
          sleep 10  # Wait for Vite preview to start

      - name: Run Cypress e2e tests
        run: |
          cd frontend
          npx cypress run --headless --browser chrome

  dependency-check:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Run OWASP dependency check
        run: |
          cd backend
          mvn dependency-check:check