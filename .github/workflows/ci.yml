name: Gaming Night CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
  schedule:
    - cron: '24 3 * * 1'

permissions:
  contents: read

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '20'

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run backend tests
        env:
          APP_AUTH_TOKEN_SECRET: ci-only-token-secret
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/gaming-night
          SPRING_DATASOURCE_USERNAME: gaming-night
          SPRING_DATASOURCE_PASSWORD: gaming-night
        run: mvn -B -f backend/pom.xml test

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Run frontend tests
        run: npm test --prefix frontend

  backend-docker-build:
    name: Backend Docker Build
    runs-on: ubuntu-latest
    needs: backend-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: false
          tags: gaming-night-backend:ci

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: frontend-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Build frontend
        env:
          VITE_API_BASE_URL: http://localhost:8080/api
        run: npm run build --prefix frontend

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  dependency-check:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run OWASP dependency check
        run: mvn -B -f backend/pom.xml dependency-check:check

  deploy-backend:
    name: Deploy Backend to Render
    runs-on: ubuntu-latest
    needs: [backend-test, backend-docker-build, dependency-check]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

    steps:
      - name: Trigger Render deploy hook
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "::warning::RENDER_DEPLOY_HOOK_URL is not set; skipping backend deploy."
            exit 0
          fi

          curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"

  deploy-frontend:
    name: Deploy Frontend to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: [frontend-test, frontend-build, dependency-check]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_PAGES_PROJECT_NAME: ${{ secrets.CLOUDFLARE_PAGES_PROJECT_NAME }}
      VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Build production frontend
        run: |
          if [ -z "$VITE_API_BASE_URL" ]; then
            echo "::warning::VITE_API_BASE_URL is not set; skipping frontend deploy."
            exit 0
          fi

          npm run build --prefix frontend

      - name: Deploy to Cloudflare Pages
        working-directory: frontend
        run: |
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ] || [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_PAGES_PROJECT_NAME" ] || [ -z "$VITE_API_BASE_URL" ]; then
            echo "::warning::Cloudflare deploy secrets are not fully set; skipping frontend deploy."
            exit 0
          fi
          if [ ! -d dist ]; then
            echo "::warning::frontend/dist does not exist; skipping frontend deploy."
            exit 0
          fi

          npx wrangler@latest pages deploy dist \
            --project-name "$CLOUDFLARE_PAGES_PROJECT_NAME" \
            --branch "$GITHUB_REF_NAME" \
            --commit-dirty=true

  e2e-test:
    name: Production E2E Tests
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend]
    if: >
      always() &&
      (
        (github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.deploy-backend.result != 'failure' && needs.deploy-frontend.result != 'failure') ||
        github.event_name == 'schedule' ||
        github.event_name == 'workflow_dispatch'
      )
    env:
      E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
      E2E_API_BASE_URL: ${{ secrets.E2E_API_BASE_URL }}
      E2E_ADMIN_USERNAME: ${{ secrets.E2E_ADMIN_USERNAME }}
      E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
      E2E_USER_USERNAME: ${{ secrets.E2E_USER_USERNAME }}
      E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Wait for deployed frontend and backend
        run: |
          if [ -z "$E2E_BASE_URL" ] || [ -z "$E2E_API_BASE_URL" ] || [ -z "$E2E_ADMIN_USERNAME" ] || [ -z "$E2E_ADMIN_PASSWORD" ] || [ -z "$E2E_USER_USERNAME" ] || [ -z "$E2E_USER_PASSWORD" ]; then
            echo "::warning::E2E secrets are not fully set; skipping production E2E tests."
            exit 0
          fi

          BACKEND_HEALTH_URL="${E2E_API_BASE_URL%/api}/actuator/health"
          for url in "$E2E_BASE_URL" "$BACKEND_HEALTH_URL"; do
            echo "Waiting for $url"
            for attempt in {1..30}; do
              if curl -fsS "$url" >/dev/null; then
                break
              fi
              if [ "$attempt" -eq 30 ]; then
                echo "::error::$url did not become ready in time."
                exit 1
              fi
              sleep 10
            done
          done

      - name: Run post-deploy affected E2E tests
        if: >
          github.event_name == 'push' &&
          env.E2E_BASE_URL != '' &&
          env.E2E_API_BASE_URL != '' &&
          env.E2E_ADMIN_USERNAME != '' &&
          env.E2E_ADMIN_PASSWORD != '' &&
          env.E2E_USER_USERNAME != '' &&
          env.E2E_USER_PASSWORD != ''
        run: npm run test:e2e:affected --prefix frontend

      - name: Run full E2E suite
        if: >
          github.event_name != 'push' &&
          env.E2E_BASE_URL != '' &&
          env.E2E_API_BASE_URL != '' &&
          env.E2E_ADMIN_USERNAME != '' &&
          env.E2E_ADMIN_PASSWORD != '' &&
          env.E2E_USER_USERNAME != '' &&
          env.E2E_USER_PASSWORD != ''
        run: npm run test:e2e --prefix frontend

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          if-no-files-found: ignore

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: frontend/test-results
          if-no-files-found: ignore
