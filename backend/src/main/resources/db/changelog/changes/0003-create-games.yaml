databaseChangeLog:
  - changeSet:
      id: 0003-create-games
      author: backede
      changes:
        - createTable:
            tableName: games
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(120)
                  constraints:
                    nullable: false
              - column:
                  name: game_type
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: calculation_method
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: text
              - column:
                  name: created_at
                  type: timestamptz
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamptz
                  constraints:
                    nullable: false
