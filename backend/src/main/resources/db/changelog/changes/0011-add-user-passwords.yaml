databaseChangeLog:
  - changeSet:
      id: 0011-add-user-passwords
      author: backede
      changes:
        - addColumn:
            tableName: users
            columns:
              - column:
                  name: password_hash
                  type: varchar(500)
        - sql:
            splitStatements: true
            stripComments: true
            sql: |
              UPDATE users
              SET password_hash = CASE username
                WHEN 'admin' THEN 'pbkdf2$120000$YWRtaW4tc2FsdA==$nFyw3RTbkEfjSxbc2unpTn8F2PiGIvMuI1FvR3AAsp0='
                WHEN 'user' THEN 'pbkdf2$120000$dXNlci1zYWx0$gJ7BNUKUhInILQXiWj2GitU0UDGlcy94bMTXsO55pVk='
                ELSE 'pbkdf2$120000$YWRtaW4tc2FsdA==$nFyw3RTbkEfjSxbc2unpTn8F2PiGIvMuI1FvR3AAsp0='
              END;
        - addNotNullConstraint:
            tableName: users
            columnName: password_hash
            columnDataType: varchar(500)
