databaseChangeLog:
  - changeSet:
      id: 0010-create-users
      author: backede
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: username
                  type: varchar(120)
                  constraints:
                    nullable: false
              - column:
                  name: role
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: player_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamptz
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamptz
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            constraintName: fk_users_player
            baseTableName: users
            baseColumnNames: player_id
            referencedTableName: players
            referencedColumnNames: id
            onDelete: RESTRICT
        - addUniqueConstraint:
            tableName: users
            columnNames: player_id
            constraintName: ux_users_player_id
        - sql:
            sql: CREATE UNIQUE INDEX ux_users_username_lower ON users (lower(username));
        - sql:
            splitStatements: true
            stripComments: true
            sql: |
              INSERT INTO users (id, username, role, player_id, created_at, updated_at) VALUES
                ('50000000-0000-0000-0000-000000000001', 'admin', 'ADMIN', '10000000-0000-0000-0000-000000000001', '2026-01-01T10:00:00Z', '2026-01-01T10:00:00Z'),
                ('50000000-0000-0000-0000-000000000002', 'user', 'USER', '10000000-0000-0000-0000-000000000002', '2026-01-01T10:00:00Z', '2026-01-01T10:00:00Z');
