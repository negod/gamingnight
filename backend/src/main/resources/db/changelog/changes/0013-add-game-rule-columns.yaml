databaseChangeLog:
  - changeSet:
      id: 0013-add-game-rule-columns
      author: backede
      changes:
        - addColumn:
            tableName: games
            columns:
              - column:
                  name: match_type
                  type: varchar(30)
              - column:
                  name: participant_rule
                  type: text
              - column:
                  name: result_type
                  type: varchar(30)
              - column:
                  name: winner_rule
                  type: varchar(30)
              - column:
                  name: scoring_rule
                  type: text
              - column:
                  name: tie_breaker_rule
                  type: varchar(30)
              - column:
                  name: validation_rule
                  type: text
              - column:
                  name: rotation_rule
                  type: varchar(30)
              - column:
                  name: time_limit_rule
                  type: text
              - column:
                  name: bonus_rules
                  type: text
              - column:
                  name: platform
                  type: varchar(120)
              - column:
                  name: genre
                  type: varchar(120)
              - column:
                  name: is_active
                  type: boolean
                  defaultValueBoolean: true
