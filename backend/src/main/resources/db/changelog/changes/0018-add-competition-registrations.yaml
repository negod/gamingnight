databaseChangeLog:
  - changeSet:
      id: 0018-add-competition-registrations
      author: backede
      changes:
        - createTable:
            tableName: competition_registered_player_ids
            columns:
              - column:
                  name: competition_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: player_id
                  type: uuid
                  constraints:
                    nullable: false
        - addPrimaryKey:
            tableName: competition_registered_player_ids
            columnNames: competition_id, player_id
            constraintName: pk_competition_registered_player_ids
        - addForeignKeyConstraint:
            constraintName: fk_competition_registered_player_ids_competition
            baseTableName: competition_registered_player_ids
            baseColumnNames: competition_id
            referencedTableName: competitions
            referencedColumnNames: id
            onDelete: CASCADE
        - addForeignKeyConstraint:
            constraintName: fk_competition_registered_player_ids_player
            baseTableName: competition_registered_player_ids
            baseColumnNames: player_id
            referencedTableName: players
            referencedColumnNames: id
            onDelete: CASCADE
